name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/

      - name: Lint (clippy)
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint (ESLint)
        run: bun run lint

      - name: Test (unit)
        run: bun run test

      - name: Detect sticker assets
        run: |
          if [ -f public/stickers/manifest.json ]; then
            echo "NEXT_PUBLIC_FEATURE_STICKERS=true" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_FEATURE_STICKERS=false" >> "$GITHUB_ENV"
          fi

      - name: Build (static export)
        run: bun run build

      - name: Upload static export artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: frontend/out/
          retention-days: 1

  version:
    name: Build Release Binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/

      - name: Build release binary
        working-directory: backend/
        run: cargo build --release

      - name: Download frontend static export
        uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: frontend-out/

      - name: Compute version+sha tag
        id: tag
        run: |
          version=$(grep -m1 '^version' backend/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          sha=$(git rev-parse --short HEAD)
          echo "tag=v${version}+${sha}" >> "$GITHUB_OUTPUT"

      - name: Package binary, frontend, and checksums
        run: |
          mkdir -p release/static
          cp backend/target/release/rav-email-server release/
          cp -r frontend-out/. release/static/
          tar -czf rav-email-server-linux-x86_64.tar.gz -C release .
          sha256sum rav-email-server-linux-x86_64.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            rav-email-server-linux-x86_64.tar.gz
            checksums.txt

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
